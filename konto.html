<!-- SICHERHEIT -->
<div id="panel-security" class="konto-panel">
  <div class="konto-card">
    <div class="konto-card-title">🔒 Sicherheit</div>
    <p class="konto-card-sub">Verwalten Sie Ihr Passwort und die Kontosicherheit.</p>
    <div id="bannerSecurity" class="banner banner-ok">✓ Passwort wurde erfolgreich geändert.</div>
    <div id="bannerSecurityErr" class="banner banner-err"></div>

    <div class="security-item">
      <div class="security-ico">🔑</div>
      <div class="security-info">
        <strong>Passwort ändern</strong>
        <span>Zuletzt geändert: –</span>
      </div>
    </div>
    <div style="margin-top:16px">
      <div class="form-group">
        <label>Aktuelles Passwort <span class="req">*</span></label>
        <div class="pw-wrap"><input type="password" class="form-control" id="currentPw"></div>
      </div>
      <div class="form-group">
        <label>Neues Passwort</label>
        <div class="pw-wrap"><input type="password" class="form-control" id="pwNew"><button type="button" class="pw-eye" onclick="togglePw('pwNew',this)">👁</button></div>
      </div>
      <div class="form-group">
        <label>Neues Passwort bestätigen</label>
        <div class="pw-wrap"><input type="password" class="form-control" id="pwConfirm"><button type="button" class="pw-eye" onclick="togglePw('pwConfirm',this)">👁</button></div>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn-primary" onclick="changePassword()">Passwort ändern</button>
      </div>
    </div>

    <div class="security-item" style="margin-top:24px">
      <div class="security-ico">🗑</div>
      <div class="security-info">
        <strong>Konto löschen</strong>
        <span>Alle Daten werden unwiderruflich gelöscht</span>
      </div>
      <button class="btn-danger" onclick="deleteAccount()">Konto löschen</button>
    </div>
  </div>
</div>
